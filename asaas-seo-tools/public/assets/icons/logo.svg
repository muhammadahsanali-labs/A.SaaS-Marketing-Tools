<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" width="160" height="40">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- A icon box -->
  <rect x="0" y="4" width="32" height="32" rx="6" fill="#0A0A0A" stroke="#39FF14" stroke-width="1.5"/>
  <text x="16" y="26" font-family="'Syne', sans-serif" font-weight="800" font-size="20" fill="#39FF14" text-anchor="middle" filter="url(#glow)">A</text>
  <!-- Brand text -->
  <text x="40" y="19" font-family="'Syne', sans-serif" font-weight="800" font-size="13" fill="#FFFFFF" letter-spacing="0.5">SaaS</text>
  <text x="40" y="34" font-family="'Plus Jakarta Sans', sans-serif" font-weight="500" font-size="10" fill="#39FF14" letter-spacing="1.5">TOOLS</text>
</svg>
