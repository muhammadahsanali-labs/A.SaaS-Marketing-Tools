<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Description Generator | A.SaaS Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/global.css">

    
    <style>
        /* --- TOOL SPECIFIC STYLING --- */
        body { padding-top: 100px; }
        
        .tool-nav {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px 5%; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color);
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
        }
        .tool-nav .logo { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 800; }
        .tool-nav .logo span { color: var(--primary); }
        .back-link { color: var(--text-sec); font-size: 0.9rem; transition: color 0.3s; }
        .back-link:hover { color: var(--text-main); }

        .tool-container {
            max-width: 1200px; margin: 0 auto; padding: 40px 5%;
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 40px;
        }

        .tool-header { grid-column: span 2; margin-bottom: 20px; }
        .tool-header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .tool-header p { color: var(--text-sec); }

        .glass-panel {
            background: rgba(22, 22, 22, 0.4); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            height: fit-content;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; font-size: 0.9rem; color: var(--text-sec);
            margin-bottom: 8px; font-weight: 500;
        }
        .input-group input {
            width: 100%; padding: 14px 15px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color); color: var(--text-main);
            border-radius: 6px; font-family: var(--font-body);
            transition: var(--transition-smooth); outline: none;
        }
        .input-group input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }

        .results-area { display: flex; flex-direction: column; gap: 20px; }
        
        .result-card {
            background: rgba(10, 10, 10, 0.6); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 25px; position: relative;
            transition: transform 0.2s, border-color 0.2s;
        }
        .result-card:hover { border-color: rgba(57, 255, 20, 0.4); transform: translateY(-2px); }
        
        .result-desc { font-size: 1rem; color: #E8EAED; line-height: 1.6; margin-bottom: 15px; }
        
        .result-meta {
            display: flex; justify-content: space-between; align-items: center;
            font-size: 0.85rem; color: var(--text-sec);
            border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
        }

        .count-good { color: #27c93f; }
        .count-warn { color: #ffbd2e; }
        .count-bad { color: #ff5f56; }

        .copy-btn {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-sec); padding: 6px 14px; border-radius: 4px;
            cursor: pointer; transition: all 0.2s; font-size: 0.85rem; font-weight: 500;
        }
        .copy-btn:hover { background: rgba(57, 255, 20, 0.1); color: var(--primary); border-color: var(--primary); }

        .empty-state {
            text-align: center; color: var(--text-sec); padding: 50px 20px;
            border: 1px dashed var(--border-color); border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }

        @media (max-width: 968px) { .tool-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="tool-nav">
        <a href="../../index.html" class="logo">A.SaaS<span>.</span></a>
        <a href="../../index.html" class="back-link">← Back to Dashboard</a>
    </nav>

    <div class="tool-container">
        <div class="tool-header">
            <h1>Meta Description Maker</h1>
            <p>Generate compelling, click-driving descriptions. Ideal length: 140-160 characters.</p>
        </div>

        <div class="glass-panel">
            <div class="input-group">
                <label for="mainKeyword">Target Keyword (Required)</label>
                <input type="text" id="mainKeyword" placeholder="e.g. SEO Agency Karachi">
            </div>
            
            <div class="input-group">
                <label for="brandName">Brand Name (Required)</label>
                <input type="text" id="brandName" placeholder="e.g. A.SaaS Tools">
            </div>
            
            <div class="input-group">
                <label for="ctaInput">Call To Action (Optional)</label>
                <input type="text" id="ctaInput" placeholder="e.g. Get a free consultation today">
            </div>

            <button id="generateBtn" class="btn btn-primary" style="width: 100%; margin-top: 15px;">
                Draft Descriptions
            </button>
        </div>

        <div class="results-area" id="resultsArea">
            <div class="empty-state">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--border-color)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                Provide your keyword and brand to start generating.
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const generateBtn = document.getElementById('generateBtn');
            const generateBtnText = generateBtn.innerHTML;
            
            if (generateBtn) {
                generateBtn.addEventListener('click', () => {
                    const mainInput = document.getElementById('mainKeyword');
                    const brandInput = document.getElementById('brandName');
                    const ctaInput = document.getElementById('ctaInput');
                    const resultsArea = document.getElementById('resultsArea');

                    const main = mainInput.value.trim();
                    const brand = brandInput.value.trim();
                    let cta = ctaInput.value.trim();

                    if (!main || !brand) {
                        alert("Target Keyword and Brand Name are required.");
                        return;
                    }

                    // Default CTA if none provided
                    if(!cta) cta = "Contact us today to learn more and get started.";
                    
                    // Format CTA properly (ensure it ends with punctuation)
                    if (!cta.match(/[.!?]$/)) cta += ".";

                    generateBtn.innerHTML = 'Structuring Sentences...';
                    generateBtn.style.opacity = '0.7';
                    generateBtn.disabled = true;
                    resultsArea.innerHTML = '<div class="empty-state" style="border-color: var(--primary); color: var(--primary);">Crafting semantic variations...</div>';

                    setTimeout(() => {
                        const capitalize = (str) => str.replace(/\b\w/g, l => l.toUpperCase());
                        const mainCap = capitalize(main);
                        const brandCap = capitalize(brand);

                        // Advanced Template Engine for Meta Descriptions
                        const advancedTemplates = [];

                        // 1. Solution-Oriented
                        advancedTemplates.push(`Looking for expert ${mainCap}? ${brandCap} provides industry-leading solutions tailored for your business growth. ${capitalize(cta)}`);
                        
                        // 2. Authority & Trust
                        advancedTemplates.push(`Trust ${brandCap} for premium ${mainCap}. We deliver measurable results and proven strategies to help you dominate your market. ${capitalize(cta)}`);
                        
                        // 3. Direct & Actionable
                        advancedTemplates.push(`Maximize your performance with the best ${mainCap}. Partner with ${brandCap} for innovative strategies and dedicated support. ${capitalize(cta)}`);

                        // 4. Value Proposition
                        advancedTemplates.push(`Unlock your business potential with ${brandCap}'s specialized ${mainCap} services. Experience quality, speed, and reliability. ${capitalize(cta)}`);

                        resultsArea.innerHTML = ''; 

                        advancedTemplates.forEach((desc, index) => {
                            const length = desc.length;
                            let colorClass = 'count-bad';
                            let lengthStatus = 'Too Long/Short';
                            
                            // Google truncates around 155-160 chars
                            if (length >= 140 && length <= 160) {
                                colorClass = 'count-good';
                                lengthStatus = 'Optimal';
                            } else if (length >= 120 && length <= 170) {
                                colorClass = 'count-warn';
                                lengthStatus = 'Acceptable';
                            }

                            // Only show reasonable outputs
                            if (length >= 80 && length <= 220) {
                                const delay = index * 0.1;
                                
                                const cardHTML = `
                                    <div class="result-card fade-up show-element" style="transition-delay: ${delay}s">
                                        <div class="result-desc">${desc}</div>
                                        <div class="result-meta">
                                            <span>
                                                <span class="${colorClass}" style="font-weight: 600;">${lengthStatus}</span> 
                                                <span style="opacity: 0.6; margin-left: 5px;">(${length} chars)</span>
                                            </span>
                                            <button class="copy-btn" onclick="copyToClipboard(this, '${desc.replace(/'/g, "\\'")}')">Copy Description</button>
                                        </div>
                                    </div>
                                `;
                                resultsArea.insertAdjacentHTML('beforeend', cardHTML);
                            }
                        });

                        generateBtn.innerHTML = generateBtnText;
                        generateBtn.style.opacity = '1';
                        generateBtn.disabled = false;

                    }, 800);
                });
            }
        });

        function copyToClipboard(btnElement, text) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = btnElement.innerText;
                btnElement.innerText = 'Copied! ✓';
                btnElement.style.color = 'var(--text-main)';
                btnElement.style.borderColor = 'var(--primary)';
                btnElement.style.background = 'var(--primary)';
                
                setTimeout(() => {
                    btnElement.innerText = originalText;
                    btnElement.style.color = 'var(--text-sec)';
                    btnElement.style.borderColor = 'var(--border-color)';
                    btnElement.style.background = 'transparent';
                }, 2000);
            });
        }
    </script>

<!-- Cursor -->
<div class="cursor-dot"></div>
<div class="cursor-trail-container" id="trailContainer"></div>
<!-- Cursor End -->

<script src="../../js/main.js"></script>
<script src="../../js/animations.js"></script>       


</body>
</html>
