<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Density Checker | A.SaaS Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../css/global.css">
   
    <style>
        body { padding-top: 100px; }
        
        .tool-nav {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 15px 5%; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(12px); border-bottom: 1px solid var(--border-color);
            z-index: 1000; display: flex; justify-content: space-between; align-items: center;
        }
        .tool-nav .logo { font-family: var(--font-heading); font-size: 1.2rem; font-weight: 800; }
        .tool-nav .logo span { color: var(--primary); }
        .back-link { color: var(--text-sec); font-size: 0.9rem; transition: color 0.3s; }
        .back-link:hover { color: var(--text-main); }

        .tool-container {
            max-width: 1200px; margin: 0 auto; padding: 40px 5%;
            display: grid; grid-template-columns: 1.2fr 1fr; gap: 40px;
        }

        .tool-header { grid-column: span 2; margin-bottom: 20px; }
        .tool-header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .tool-header p { color: var(--text-sec); }

        .glass-panel {
            background: rgba(22, 22, 22, 0.4); backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            height: fit-content;
        }

        .input-group { margin-bottom: 20px; }
        .input-group label {
            display: block; font-size: 0.9rem; color: var(--text-sec);
            margin-bottom: 8px; font-weight: 500;
        }
        .input-group input, .input-group textarea {
            width: 100%; padding: 14px 15px; background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border-color); color: var(--text-main);
            border-radius: 6px; font-family: var(--font-body);
            transition: var(--transition-smooth); outline: none;
        }
        .input-group textarea { height: 250px; resize: vertical; line-height: 1.6; }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(57, 255, 20, 0.2); }

        /* Results Dashboard Style */
        .results-area { display: flex; flex-direction: column; gap: 20px; }
        
        .metric-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px;
        }

        .metric-card {
            background: rgba(10, 10, 10, 0.6); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 20px; text-align: center;
        }
        
        .metric-value { font-size: 2.2rem; font-family: var(--font-heading); font-weight: 700; margin-bottom: 5px; }
        .metric-label { font-size: 0.85rem; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; }

        /* Status Card */
        .status-card {
            background: rgba(10, 10, 10, 0.6); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 25px;
        }
        
        .status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .status-title { font-size: 1.1rem; font-weight: 600; }
        .status-badge { padding: 4px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; }

        .progress-bar-bg { width: 100%; height: 8px; background: rgba(255,255,255,0.05); border-radius: 100px; overflow: hidden; margin-bottom: 15px; }
        .progress-bar-fill { height: 100%; width: 0%; transition: width 1s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.5s; }

        .recommendation { font-size: 0.9rem; color: var(--text-sec); line-height: 1.5; padding-top: 15px; border-top: 1px dashed var(--border-color); }

        /* Color Codes */
        .color-optimal { color: #27c93f; }
        .bg-optimal { background-color: #27c93f; box-shadow: 0 0 15px rgba(39, 201, 63, 0.4); }
        .border-optimal { border-color: rgba(39, 201, 63, 0.3); }

        .color-warn { color: #ffbd2e; }
        .bg-warn { background-color: #ffbd2e; box-shadow: 0 0 15px rgba(255, 189, 46, 0.4); }
        .border-warn { border-color: rgba(255, 189, 46, 0.3); }

        .color-danger { color: #ff5f56; }
        .bg-danger { background-color: #ff5f56; box-shadow: 0 0 15px rgba(255, 95, 86, 0.4); }
        .border-danger { border-color: rgba(255, 95, 86, 0.3); }

        .empty-state { text-align: center; color: var(--text-sec); padding: 50px 20px; border: 1px dashed var(--border-color); border-radius: 8px; }

        @media (max-width: 968px) { .tool-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <nav class="tool-nav">
        <a href="../../index.html" class="logo">A.SaaS<span>.</span></a>
        <a href="../../index.html" class="back-link">← Back to Dashboard</a>
    </nav>

    <div class="tool-container">
        <div class="tool-header">
            <h1>Keyword Density Checker</h1>
            <p>Analyze your content for perfect semantic balance. Ideal keyword density is between 1% and 2.5%.</p>
        </div>

        <div class="glass-panel">
            <div class="input-group">
                <label for="targetKeyword">Target Keyword / Phrase</label>
                <input type="text" id="targetKeyword" placeholder="e.g. SEO services">
            </div>
            
            <div class="input-group">
                <label for="contentArea">Your Content</label>
                <textarea id="contentArea" placeholder="Paste your article, blog post, or webpage content here..."></textarea>
            </div>

            <button id="analyzeBtn" class="btn btn-primary" style="width: 100%;">
                Analyze Content
            </button>
        </div>

        <div class="results-area" id="resultsArea">
            <div class="empty-state">
                Paste your content and enter a keyword to see detailed metrics.
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const analyzeBtn = document.getElementById('analyzeBtn');
            const analyzeBtnText = analyzeBtn.innerHTML;
            
            if (analyzeBtn) {
                analyzeBtn.addEventListener('click', () => {
                    const keywordInput = document.getElementById('targetKeyword').value.trim().toLowerCase();
                    const contentInput = document.getElementById('contentArea').value.trim();
                    const resultsArea = document.getElementById('resultsArea');

                    if (!keywordInput || !contentInput) {
                        alert("Please provide both a Target Keyword and Content to analyze.");
                        return;
                    }

                    analyzeBtn.innerHTML = 'Analyzing...';
                    analyzeBtn.style.opacity = '0.7';
                    analyzeBtn.disabled = true;

                    setTimeout(() => {
                        // Logic for counting words and keywords
                        // Remove punctuation and extra spaces for accurate word count
                        const cleanContent = contentInput.replace(/[^\w\s]/gi, ' ').replace(/\s+/g, ' ');
                        const wordsArray = cleanContent.split(' ').filter(word => word.length > 0);
                        const totalWords = wordsArray.length;

                        // Count exact phrase matches
                        // Escape regex characters in keyword
                        const escapeRegExp = (string) => string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        const safeKeyword = escapeRegExp(keywordInput);
                        const regex = new RegExp('\\b' + safeKeyword + '\\b', 'gi');
                        
                        const keywordMatches = contentInput.match(regex);
                        const keywordCount = keywordMatches ? keywordMatches.length : 0;

                        // Calculate Density
                        let density = 0;
                        if (totalWords > 0) {
                            // Density formula: (Keyword Count * Words in Keyword) / Total Words
                            const keywordWordCount = keywordInput.split(' ').length;
                            density = ((keywordCount * keywordWordCount) / totalWords) * 100;
                        }
                        
                        const densityFormatted = density.toFixed(2);

                        // Determine Status & Colors
                        let statusText = '';
                        let colorClass = '';
                        let bgClass = '';
                        let borderClass = '';
                        let recommendation = '';
                        
                        // SEO Logic for Density
                        if (density === 0) {
                            statusText = 'MISSING'; colorClass = 'color-danger'; bgClass = 'bg-danger'; borderClass = 'border-danger';
                            recommendation = "Your target keyword does not appear in the content. Try adding it naturally to the introduction and a few headings.";
                        } else if (density > 0 && density < 0.5) {
                            statusText = 'LOW'; colorClass = 'color-warn'; bgClass = 'bg-warn'; borderClass = 'border-warn';
                            recommendation = "Your keyword density is very low. Add the keyword a few more times to give search engines a clearer signal.";
                        } else if (density >= 0.5 && density <= 2.5) {
                            statusText = 'OPTIMAL'; colorClass = 'color-optimal'; bgClass = 'bg-optimal'; borderClass = 'border-optimal';
                            recommendation = "Perfect! Your keyword density is in the sweet spot. Your content looks natural and optimized.";
                        } else if (density > 2.5 && density <= 4) {
                            statusText = 'HIGH'; colorClass = 'color-warn'; bgClass = 'bg-warn'; borderClass = 'border-warn';
                            recommendation = "Your density is getting high. Make sure the content reads naturally to humans. Consider using LSI (synonym) keywords instead.";
                        } else {
                            statusText = 'SPAMMY'; colorClass = 'color-danger'; bgClass = 'bg-danger'; borderClass = 'border-danger';
                            recommendation = "Warning: Keyword stuffing detected! This can lead to Google penalties. Rewrite sentences to remove the keyword and use variations.";
                        }

                        // Cap progress bar at 100% (or visually cap at 5% for SEO scale)
                        let progressPercentage = (density / 5) * 100;
                        if(progressPercentage > 100) progressPercentage = 100;

                        // Build Results UI
                        resultsArea.innerHTML = `
                            <div class="metric-grid fade-up show-element">
                                <div class="metric-card">
                                    <div class="metric-value">${totalWords}</div>
                                    <div class="metric-label">Total Words</div>
                                </div>
                                <div class="metric-card">
                                    <div class="metric-value ${colorClass}">${keywordCount}</div>
                                    <div class="metric-label">Keyword Occurrences</div>
                                </div>
                            </div>

                            <div class="status-card ${borderClass} fade-up show-element" style="transition-delay: 0.1s;">
                                <div class="status-header">
                                    <div class="status-title">Density Score</div>
                                    <div class="status-badge ${colorClass}" style="background: rgba(255,255,255,0.05); border: 1px solid currentColor;">
                                        ${statusText}
                                    </div>
                                </div>
                                
                                <div class="metric-value ${colorClass}" style="font-size: 3rem; margin-bottom: 15px;">${densityFormatted}%</div>
                                
                                <div class="progress-bar-bg">
                                    <div class="progress-bar-fill ${bgClass}" style="width: 0%;"></div>
                                </div>
                                
                                <div class="recommendation">
                                    <strong>AI Analysis:</strong> ${recommendation}
                                </div>
                            </div>
                        `;

                        // Trigger progress bar animation after DOM updates
                        setTimeout(() => {
                            const bar = document.querySelector('.progress-bar-fill');
                            if(bar) bar.style.width = `${progressPercentage}%`;
                        }, 50);

                        analyzeBtn.innerHTML = analyzeBtnText;
                        analyzeBtn.style.opacity = '1';
                        analyzeBtn.disabled = false;

                    }, 600); // 600ms fake processing delay
                });
            }
        });
    </script>

<!-- Cursor -->
<div class="cursor-dot"></div>
<div class="cursor-trail-container" id="trailContainer"></div>
<!-- Cursor End -->

    <script src="../../js/main.js"></script>

</body>
</html>
